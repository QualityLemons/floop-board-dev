<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Feedback Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- THE EMOJI TOOL COMPONENT ---
        const EmojiTool = () => {
            const [rating, setRating] = useState(null);
            const emojis = ['😢', '😐', '😊', '🤩'];

            const handleReset = () => setRating(null);

            return (
                <div className="max-w-md w-full border-2 border-slate-200 rounded-2xl p-8 bg-white shadow-sm text-center">
                    <header className="mb-8">
                        <h2 className="text-2xl font-bold text-slate-800">How are you feeling?</h2>
                        <p className="text-slate-500 mt-2">Tap an emoji to share your mood.</p>
                    </header>

                    {/* Emoji Selection Row */}
                    <div className="flex justify-between items-center px-2">
                        {emojis.map((emoji) => (
                            <button 
                                key={emoji} 
                                onClick={() => setRating(emoji)}
                                className={`text-6xl transition-all duration-300 transform active:scale-90 ${
                                    rating === emoji 
                                        ? "grayscale-0 scale-125 drop-shadow-md" 
                                        : "grayscale opacity-30 hover:opacity-60"
                                }`}
                                aria-label={`Rate as ${emoji}`}
                            >
                                {emoji}
                            </button>
                        ))}
                    </div>

                    {/* Feedback Message & Actions */}
                    <div className="mt-10 h-12 flex items-center justify-center">
                        {rating ? (
                            <p className="text-indigo-600 font-semibold animate-pulse">
                                Selected: {rating}
                            </p>
                        ) : (
                            <p className="text-slate-300 text-sm italic">Nothing selected yet</p>
                        )}
                    </div>

                    <button 
                        onClick={handleReset}
                        className="mt-4 text-xs font-bold text-slate-400 hover:text-slate-600 uppercase tracking-widest transition-colors"
                    >
                        Reset Selection
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EmojiTool />);
    </script>
</body>
</html>
