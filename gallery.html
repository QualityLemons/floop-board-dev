<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floop! - Feedback Gallery</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --light: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--light); 
            padding: 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        h1 { text-align: center; color: var(--primary); font-size: 3rem; margin-bottom: 10px; }
        
        /* Live Badge Style */
        .live-status {
            text-align: center;
            font-size: 0.8rem;
            color: #27ae60;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .dot {
            height: 10px;
            width: 10px;
            background-color: #27ae60;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        .feedback-card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.2s;
        }

        .feedback-card img { width: 100%; border-radius: 8px; border: 1px solid #ddd; }
        
        .meta { margin: 10px 0; font-size: 0.85rem; color: #7f8c8d; }

        /* Professional Reaction Chips */
        .reaction-bar {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .reaction-chip {
            border: 1px solid #e0e0e0;
            background: white;
            padding: 5px 8px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .reaction-chip:hover { transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chip-happy:hover { background: #fff9c4; border-color: #fbc02d; }
        .chip-sad:hover { background: #e3f2fd; border-color: #1e88e5; }
        .chip-angry:hover { background: #ffebee; border-color: #e53935; }
        .chip-anxious:hover { background: #f3e5f5; border-color: #8e24aa; }

        .nav-btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--secondary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }

#scrollTopBtn {
    display: none; position: fixed; bottom: 20px; right: 30px;
    background: var(--primary); color: white; border: none;
    padding: 15px; border-radius: 50%; cursor: pointer;
}
    </style>
</head>
<body>

    <a href="index.html" class="nav-btn">← Back to Form</a>
    
    <h1>Floop Gallery</h1>
    <div class="live-status"><span class="dot"></span> LIVE UPDATES ACTIVE</div>

    <div id="gallery" class="gallery-grid">Loading drawings...</div>

    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="scrollTopBtn">↑</button>

    <script>
        // Update this with your actual Web App URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxt-K2R8ErsBOJ8TqHKDvbdeI1fN-4Bz_d42xMgHvJBkqao0ET0ZegSiMEma22SneX6/exec';

    async function refreshData() {
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            
            console.log("Data received from Sheet:", data); // <-- ADD THIS LINE

            if (data.drawings.length === 0) {
                document.getElementById('gallery').innerText = "No drawings found in the sheet yet!";
                return;
            }

            displayGallery(data.drawings);
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    function displayGallery(data) {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';
        if (data && data.length > 0) {
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'feedback-card';
                card.innerHTML = `
                    <img src="${item.imageUrl}" alt="Feedback">
                    <p class="meta">Submitted: ${new Date(item.timestamp).toLocaleDateString()}</p>
                    <div class="reaction-bar">
                        <button class="reaction-chip chip-happy">😊 Happy</button>
                        <button class="reaction-chip chip-sad">😢 Sad</button>
                        <button class="reaction-chip chip-angry">😠 Angry</button>
                        <button class="reaction-chip chip-anxious">😰 Anxious</button>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }
    }

    // Show scroll to top button
    window.addEventListener('scroll', () => {
        document.getElementById('scrollTopBtn').style.display = window.scrollY > 300 ? 'block' : 'none';
    });

    // Initial load
    refreshData();
    </script>
