<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Sandbox v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 p-8">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- 1. The Container (from our previous step) ---
        const ToolContainer = ({ title, description, children, onReset }) => (
            <div className="max-w-xl mx-auto border-2 border-slate-100 rounded-xl p-6 bg-white shadow-sm mb-8">
                <div className="mb-6 border-b border-slate-50 pb-4">
                    <h3 className="text-xl font-bold text-slate-800">{title}</h3>
                    <p className="text-sm text-slate-500 mt-1">{description}</p>
                </div>
                <div className="tool-content min-h-[150px] flex items-center justify-center bg-slate-50 rounded-lg p-4">
                    {children}
                </div>
                <div className="mt-6 flex justify-end gap-3">
                    <button onClick={onReset} className="px-4 py-2 text-sm text-slate-400 hover:text-slate-600">
                        Clear Canvas
                    </button>
                </div>
            </div>
        );

        // --- 2. The Drawing Tool ---
        const DrawingCanvas = () => {
            const canvasRef = useRef(null);
            const contextRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [activeColor, setActiveColor] = useState('#0f172a');

            const colors = [
                { name: 'Blue', value: '#3b82f6' },
                { name: 'Yellow', value: '#eab308' },
                { name: 'Orange', value: '#f97316' },
                { name: 'Black', value: '#0f172a' }
            ];

            useEffect(() => {
                const canvas = canvasRef.current;
                canvas.width = canvas.offsetWidth * 2;
                canvas.height = canvas.offsetHeight * 2;
                const context = canvas.getContext('2d');
                context.scale(2, 2);
                context.lineCap = 'round';
                context.lineWidth = 5;
                context.strokeStyle = activeColor;
                contextRef.current = context;
            }, []);

            useEffect(() => {
                if (contextRef.current) contextRef.current.strokeStyle = activeColor;
            }, [activeColor]);

            const getCoords = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const event = e.touches ? e.touches[0] : e;
                return {
                    x: (event.clientX || e.nativeEvent.offsetX + rect.left) - rect.left,
                    y: (event.clientY || e.nativeEvent.offsetY + rect.top) - rect.top
                };
            };

            const start = (e) => {
                const { x, y } = getCoords(e);
                contextRef.current.beginPath();
                contextRef.current.moveTo(x, y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const { x, y } = getCoords(e);
                contextRef.current.lineTo(x, y);
                contextRef.current.stroke();
            };

            const stop = () => {
                contextRef.current.closePath();
                setIsDrawing(false);
            };

            const clear = () => {
                const context = canvasRef.current.getContext('2d');
                context.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
            };

            return (
                <ToolContainer 
                    title="Visual Feedback" 
                    description="Draw how you feel or sketch an idea."
                    onReset={clear}
                >
                    <div className="w-full flex flex-col gap-4">
                        <canvas 
                            ref={canvasRef}
                            onMouseDown={start} onMouseMove={draw} onMouseUp={stop} onMouseLeave={stop}
                            onTouchStart={start} onTouchMove={draw} onTouchEnd={stop}
                            className="w-full h-64 bg-white border rounded cursor-crosshair touch-none"
                        />
                        <div className="flex gap-3">
                            {colors.map(c => (
                                <button 
                                    key={c.name}
                                    onClick={() => setActiveColor(c.value)}
                                    className={`w-10 h-10 rounded-full border-4 transition-all ${activeColor === c.value ? 'border-slate-300 scale-110' : 'border-transparent'}`}
                                    style={{ backgroundColor: c.value }}
                                />
                            ))}
                        </div>
                    </div>
                </ToolContainer>
            );
        };

        // --- 3. Render the App ---
        const App = () => (
            <div className="container mx-auto">
                <header className="text-center my-12">
                    <h1 className="text-3xl font-bold text-slate-900">Drawback Sandbox</h1>
                    <p className="text-slate-500">Version 2.0 (Lightweight Edition)</p>
                </header>
                <DrawingCanvas />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
