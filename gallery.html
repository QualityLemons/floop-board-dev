<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floop! - Feedback Gallery</title>
<style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --light: #f4f7f6;
            --text: #333;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--light); 
            padding: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav { text-align: right; margin-bottom: 20px; }
        .nav-link {
            display: inline-block;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            border: 2px solid var(--secondary);
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        .nav-link:hover { background-color: var(--secondary); color: white; }

        h1 { text-align: center; color: var(--primary); font-size: 3rem; margin-bottom: 10px; }
        
        .live-status {
            text-align: center; font-size: 0.8rem; color: #27ae60;
            margin-bottom: 20px; font-weight: bold;
        }
        .dot {
            height: 10px; width: 10px; background-color: #27ae60;
            border-radius: 50%; display: inline-block; margin-right: 5px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        .feedback-card { 
            background: white; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.2s;
        }
        .feedback-card:hover { transform: translateY(-5px); }
        .feedback-card img { width: 100%; border-radius: 8px; border: 1px solid #ddd; }
        
        .meta { 
            margin-top: 15px; 
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 0.85rem; 
            color: #7f8c8d; 
            display: flex;
            justify-content: space-between;
        }

        /* --- NEW REACTION STYLES --- */
        .reaction-area {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #ccc;
        }

        .reaction-canvas {
            width: 100%;
            height: 120px; 
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 4px;
            cursor: crosshair;
            touch-action: none; /* Crucial for mobile drawing */
        }

        .reaction-btn {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .reaction-btn:hover { opacity: 0.9; }
        .reaction-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        /* -------------------------- */

        footer {
            text-align: center; margin-top: auto; padding: 40px 20px 20px;
            border-top: 1px solid #ddd; font-size: 0.9rem; color: #7f8c8d;
        }
        footer a { color: var(--secondary); text-decoration: none; font-weight: 600; }

        #scrollTopBtn {
            display: none; position: fixed; bottom: 20px; right: 30px;
            background: var(--primary); color: white; border: none;
            padding: 15px; border-radius: 50%; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

<nav>
    <a href="readme.html" class="nav-link">README</a>
        <a href="wireframe.html" class="nav-link">Wireframe</a>
        <a href="index.html" class="nav-link">← Back to Form</a>
    </nav>
    
    <h1>Floop Gallery</h1>
    <div class="live-status"><span class="dot"></span> LIVE UPDATES ACTIVE</div>

    <div id="gallery" class="gallery-grid">Loading drawings...</div>

    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="scrollTopBtn">↑</button>

    <footer>
        <p>&copy; 2026 Floop! Project | <a href="readme.html">Documentation</a> | <a href="wireframe.html">Wireframe</a></p>
    </footer>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzGWXhNW-yHhkb9q2FEk9YmZ5Mwo1d9LAETFGNSbdQt2GxyLqCf3DwFX1iNF3J4xlAv/exec';

        function setupReactionCanvas(canvasId) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    let drawing = false;

    const resizeCanvas = () => {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#3498db';
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    };

    // Ensure the canvas matches its displayed size (important for accurate dataURL capture)
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    };

    const start = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
    const stop = () => drawing = false;
    const draw = (e) => {
        if (!drawing) return;
        const p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
    };

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('touchstart', start);
    window.addEventListener('mouseup', stop);
    window.addEventListener('touchend', stop);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchmove', draw);
}

function isCanvasBlank(canvas) {
    const blank = document.createElement('canvas');
    blank.width = canvas.width;
    blank.height = canvas.height;
    return canvas.toDataURL() === blank.toDataURL();
}

async function submitReaction(canvasId, originalRowId) {
    const canvas = document.getElementById(canvasId);

    if (isCanvasBlank(canvas)) {
        alert('Please draw something before posting a reaction.');
        return;
    }

    const reactionData = canvas.toDataURL('image/png');
    const btn = canvas.nextElementSibling;
    btn.innerText = "Saving...";
    btn.disabled = true;

    const payload = {
        type: 'reaction_draw',
        originalId: originalRowId,
        reaction_image: reactionData
    };

    try {
        const response = await fetch(scriptURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            mode: 'cors'        // <- important
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        alert("Reaction posted!");
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    } catch (e) {
        console.error('Reaction error:', e);
        alert("Could not post reaction (possibly due to CORS). It is saved locally for retry.");

        const stored = JSON.parse(localStorage.getItem('floop_reactions') || '[]');
        stored.push({ originalId: originalRowId, reaction_image: reactionData, createdAt: new Date().toISOString() });
        localStorage.setItem('floop_reactions', JSON.stringify(stored));
    } finally {
        btn.innerText = "Post Reaction";
        btn.disabled = false;
    }
}

        async function refreshData() {
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                const galleryDiv = document.getElementById('gallery');

                if (!data.drawings || data.drawings.length === 0) {
                    galleryDiv.innerHTML = "<p style='grid-column: 1/-1;'>No drawings found.</p>";
                    return;
                }

                // We only need to render the gallery if the content has changed
                // For simplicity, we'll re-render if the count is different
                if (galleryDiv.innerHTML.includes('Loading') || galleryDiv.children.length !== data.drawings.length) {
                    renderGallery(data.drawings);
                }
                
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('gallery').innerHTML = "Error connecting to Google Sheets.";
            }
        }

        function renderGallery(drawings) {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    
    [...drawings].reverse().forEach((drawing, index) => {
        const card = document.createElement('div');
        card.className = 'feedback-card';
        
        // Unique ID for each reaction canvas
        const canvasId = `react-canvas-${index}`;

        card.innerHTML = `
            <img src="${drawing.my_image_data}" alt="Feedback Drawing">
            <div class="meta">
                <span>📍 ${drawing.user_postcode || 'N/A'}</span>
            </div>
            
            <div class="reaction-area">
                <label style="font-size: 0.7rem; display: block; margin-bottom: 5px;">React to the art:</label>
                <canvas id="${canvasId}" class="reaction-canvas"></canvas>
                <button class="reaction-btn" onclick="submitReaction('${canvasId}', '${drawing.rowId}')">Post Reaction</button>
            </div>
        `;
        gallery.appendChild(card);
        
        // Initialize the drawing logic for THIS specific canvas
        setupReactionCanvas(canvasId);
    });
}

        refreshData();
        setInterval(refreshData, 10000); // Check every 10s now that reactions are gone

        // Retry any locally stored reactions (saved when the network/server refused a post)
        async function retryStoredReactions() {
            const stored = JSON.parse(localStorage.getItem('floop_reactions') || '[]');
            if (!stored.length) return;

            const remaining = [];
            for (const item of stored) {
                try {
                    const response = await fetch(scriptURL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ type: 'reaction_draw', ...item }),
                        mode: 'cors'
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                } catch (e) {
                    console.warn('Retry failed:', e);
                    remaining.push(item);
                }
            }

            if (remaining.length) {
                localStorage.setItem('floop_reactions', JSON.stringify(remaining));
            } else {
                localStorage.removeItem('floop_reactions');
            }
        }

        retryStoredReactions();

        window.addEventListener('scroll', () => {
            document.getElementById('scrollTopBtn').style.display = window.scrollY > 300 ? 'block' : 'none';
        });
    </script>
</body>
</html>
