<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projector</title>
 <header class="max-w-4xl mx-auto pt-20 pb-12 px-6">
        <h1 class="text-5xl font-black tracking-tight text-slate-900 mb-4">
            Projector<span class="text-indigo-600">Feedback Tools</span>
        </h1>
        <p class="text-xl text-slate-600 leading-relaxed max-w-2xl">
            Projector is a tool designed to help users quickly turn their ideas into simple, visual projects that can be easily shared with others.
            
        </p>
</head>
<body>
<div class="container">
  <div class="form-header">
    <h1>Project Clarity Tool</h1>
    <p>Complete the fields below to generate your strategy document.</p>
  </div>

  <form id="rtfForm">
    <div class="form-group">
      <label for="q1">What do you want to accomplish?</label>
      <textarea id="q1" maxlength="210" placeholder="e.g., Launch a new community garden..."></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <div class="form-group">
      <label for="q2">What's the biggest difference this will make?</label>
      <textarea id="q2" maxlength="210" placeholder="How does this change the status quo?"></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <div class="form-group">
      <label for="q3">What does the completed project look like?</label>
      <textarea id="q3" maxlength="210" placeholder="Describe the physical or digital end-state."></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <div class="form-group">
      <label for="q4">What has to be true when this project is finished?</label>
      <textarea id="q4" maxlength="210" placeholder="List the non-negotiable requirements."></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <div class="form-group">
      <label for="q5">What is the best result if you do take action?</label>
      <textarea id="q5" maxlength="210" placeholder="The high-impact 'win' scenario."></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <div class="form-group">
      <label for="q6">What is the worst result if you don't take action?</label>
      <textarea id="q6" maxlength="210" placeholder="The cost of inaction."></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <button type="submit" id="submitBtn">Generate & Download .RTF</button>
  </form>
</div>

    <form id="rtfForm">
  <label>What do you want to accomplish?</label>
  <textarea id="q1" maxlength="210" required></textarea>

  <label>What's the biggest difference this will make?</label>
  <textarea id="q2" maxlength="210" required></textarea>

  <label>What does the completed project look like?</label>
  <textarea id="q3" maxlength="210" required></textarea>

  <label>What has to be true when this project is finished?</label>
  <textarea id="q4" maxlength="210" required></textarea>

  <label>What is the best result if you do take action?</label>
  <textarea id="q5" maxlength="210" required></textarea>

  <label>What is the worst result if you don't take action?</label>
  <textarea id="q6" maxlength="210" required></textarea>

  <button type="submit">Download .RTF</button>
</form>
<script> src="script.js"</script> 
</body>
</html>
