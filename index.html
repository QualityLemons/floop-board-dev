<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floop! - Creative Feedback</title>
    
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --light: #f4f7f6;
            --text: #333;
            --card-bg: white;
        }

        body.dark-theme {
            --primary: #ecf0f1;
            --light: #121212;
            --text: #e0e0e0;
            --card-bg: #1e1e1e;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            line-height: 1.6; 
            color: var(--text); 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: var(--light); 
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav { text-align: right; margin-bottom: 10px; }
        .nav-link {
            display: inline-block;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            border: 2px solid var(--secondary);
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        .nav-link:hover { background-color: var(--secondary); color: white; }

        header { text-align: center; margin-bottom: 40px; }
        h1 { color: var(--primary); font-size: 3.5rem; margin-bottom: 0; }
        h2 { font-weight: 300; color: #7f8c8d; }

        .form-container { 
            background: var(--card-bg); padding: 40px; 
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--primary); }
        input[type="text"] { 
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; background: var(--card-bg); color: var(--text);
            box-sizing: border-box;
        }

        canvas { 
            border: 2px solid var(--primary); background: #fff; 
            cursor: crosshair; touch-action: none; border-radius: 8px; max-width: 100%;
        }

        .controls { 
            margin-top: 20px; display: flex; gap: 15px; 
            width: 100%; justify-content: center;
        }

        .btn { padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .clear-btn { background: #ecf0f1; color: #2c3e50; }
        .send-btn { background: var(--success); color: white; flex-grow: 1; max-width: 300px; }

        footer {
            text-align: center; margin-top: auto; padding: 40px 20px 20px;
            border-top: 1px solid #ddd; font-size: 0.9rem; color: #7f8c8d;
        }
        footer a { color: var(--secondary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <nav>
        <a href="readme.html" class="nav-link">README</a>
        <a href="wireframe.html" class="nav-link">Wireframe</a>
        <a href="gallery.html" class="nav-link">View Gallery →</a>
    </nav>

    <header>
        <h1>Floop!</h1>
        <h2>Creative Feedback Tool</h2>
    </header>

    <div class="form-container">
        <div class="input-group">
            <label for="userPostcode">Postcode *</label>
            <input type="text" id="userPostcode" placeholder="e.g. SW1A 1AA" required>
        </div>

        <div style="text-align: center;">
            <label>Draw your feedback below *</label><br>
            <canvas id="paintCanvas" width="600" height="350"></canvas>
            <div class="controls">
                <button type="button" class="btn clear-btn" onclick="clearCanvas()">Clear</button>
                <button type="button" id="sendBtn" class="btn send-btn" onclick="sendFeedback()">Submit</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Floop! Project | <a href="readme.html">Documentation</a> | <a href="wireframe.html">Wireframe</a></p>
    </footer>

    <script>
        // --- Canvas Logic ---
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function initCanvas() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#2c3e50';
        }
        initCanvas();

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        };

        const start = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
        const stop = () => drawing = false;
        const draw = (e) => { 
            if (!drawing) return; 
            e.preventDefault(); 
            const p = getPos(e); 
            ctx.lineTo(p.x, p.y); 
            ctx.stroke(); 
        };

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('touchstart', start);
        window.addEventListener('mouseup', stop);
        window.addEventListener('touchend', stop);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchmove', draw);

        function clearCanvas() { initCanvas(); }

        // --- Submission Logic ---
        async function sendFeedback() {
            const postcode = document.getElementById('userPostcode').value;
            if (!postcode.trim()) {
                alert('Please enter a postcode');
                return;
            }

            const btn = document.getElementById('sendBtn');
            btn.innerText = "Sending...";
            btn.disabled = true;

            const payload = {
                user_postcode: postcode,
                my_image_data: canvas.toDataURL('image/png')
            };

                    try {
                        const response = await fetch('/submit-feedback', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
        
                        if (response.ok) {
                            alert('Feedback submitted successfully!');
                            document.getElementById('userPostcode').value = '';
                            clearCanvas();
                        } else {
                            alert('Error submitting feedback');
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        alert('Failed to submit feedback');
                    } finally {
                        btn.innerText = "Submit";
                        btn.disabled = false;
                    }
                }
        
                // --- Theme Toggle ---
                function toggleTheme() {
                    document.body.classList.toggle('dark-theme');
                    localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
                }
        
                if (localStorage.getItem('theme') === 'dark') {
                    document.body.classList.add('dark-theme');
                }
            </script>
