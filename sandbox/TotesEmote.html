<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Sandbox v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<body class="bg-slate-50 p-8">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- 1. The Container (from our previous step) ---
        const ToolContainer = ({ title, description, children, onReset }) => (
            <div className="max-w-xl mx-auto border-2 border-slate-100 rounded-xl p-6 bg-white shadow-sm mb-8">
                <div className="mb-6 border-b border-slate-50 pb-4">
                    <h3 className="text-xl font-bold text-slate-800">{title}</h3>
                    <p className="text-sm text-slate-500 mt-1">{description}</p>
                </div>
                <div className="tool-content min-h-[150px] flex items-center justify-center bg-slate-50 rounded-lg p-4">
                    {children}
                </div>
                <div className="mt-6 flex justify-end gap-3">
                    <button onClick={onReset} className="px-4 py-2 text-sm text-slate-400 hover:text-slate-600">
                        Clear Canvas
                    </button>
                </div>
            </div>
        );
        // Example: Creating a new tool using the template
const TotesEmote = () => {
  const [rating, setRating] = React.useState(null);

  return (
    <ToolContainer 
      title="How are you feeling?" 
      description="A quick sentiment check."
      onReset={() => setRating(null)}
    >
      <div className="flex gap-4 text-4xl">
        {['😢', '😐', '😊', '🤩'].map(emoji => (
          <button 
            key={emoji} 
            onClick={() => setRating(emoji)}
            className={rating === emoji ? "scale-125 grayscale-0" : "grayscale opacity-50"}
          >
            {emoji}
          </button>
        ))}
      </div>
    </ToolContainer>
  );
};
