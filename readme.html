<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floop! - Documentation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; }
        body { background-color: #f4f7f6; padding: 40px; font-family: 'Segoe UI', sans-serif; }
        .container { 
            max-width: 900px; margin: 0 auto; background: white; 
            padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }
        .nav-link {
            display: inline-block; margin-bottom: 20px; color: var(--secondary);
            text-decoration: none; font-weight: 600;
        }
        .markdown-body { background: transparent !important; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="nav-link">← Back to Home</a>
        
        <article id="content" class="markdown-body">
            <p>Loading documentation...</p>
        </article>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function loadReadme() {
            try {
                // Fetches your actual README.md file
                const response = await fetch('README.md');
                if (!response.ok) throw new Error('README.md not found');
                
                const markdown = await response.text();
                // Converts Markdown string to HTML
                document.getElementById('content').innerHTML = marked.parse(markdown);
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    `<p style="color:red">Error: Could not load the README file. Ensure README.md exists in your folder.</p>`;
            }
        }

        loadReadme();
    </script>
</body>
</html>
