<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">

return (
                <div className="max-w-3xl mx-auto">
                    <nav className="mb-6">
                        <a href="index.html" className="text-indigo-600 font-bold hover:underline">
                            ← Back to Hub
                        </a>
                    </nav>

                    <header className="mb-8">
                        <h1 className="text-4xl font-black text-slate-900 tracking-tight">Projector</h1>
                        <p className="text-slate-500 mt-2">A minimalist tool for turning ideas into shareable projects.</p>
                    </header>


   <form id="rtfForm">
    <div class="form-group">
      <label for="q1">What do you want to accomplish?</label>
      <textarea id="q1" maxlength="210" placeholder="e.g., Launch a new community garden..."></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <div class="form-group">
      <label for="q2">What's the biggest difference this will make?</label>
      <textarea id="q2" maxlength="210" placeholder="How does this change the status quo?"></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <div class="form-group">
      <label for="q3">What does the completed project look like?</label>
      <textarea id="q3" maxlength="210" placeholder="Describe the physical or digital end-state."></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <div class="form-group">
      <label for="q4">What has to be true when this project is finished?</label>
      <textarea id="q4" maxlength="210" placeholder="List the non-negotiable requirements."></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <div class="form-group">
      <label for="q5">What is the best result if you do take action?</label>
      <textarea id="q5" maxlength="210" placeholder="The high-impact 'win' scenario."></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <div class="form-group">
      <label for="q6">What is the worst result if you don't take action?</label>
      <textarea id="q6" maxlength="210" placeholder="The cost of inaction."></textarea>
      <div class="counter">0 / 210</div>
    </div>

    <button type="submit" id="submitBtn">Generate & Download .RTF</button>
  </form>
</div>
<script> src="script.js"</script> 
</body>
</html>
