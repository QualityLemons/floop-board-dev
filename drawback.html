<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawback Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Drawback = () => {
            const canvasRef = useRef(null);
            const contextRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [activeColor, setActiveColor] = useState('#0f172a');

            const colors = [
                { name: 'Blue', value: '#3b82f6' },
                { name: 'Yellow', value: '#eab308' },
                { name: 'Orange', value: '#f97316' },
                { name: 'Black', value: '#0f172a' }
            ];

            // Initialize Canvas
            useEffect(() => {
                const canvas = canvasRef.current;
                canvas.width = canvas.offsetWidth * 2;
                canvas.height = canvas.offsetHeight * 2;
                const context = canvas.getContext('2d');
                context.scale(2, 2);
                context.lineCap = 'round';
                context.lineWidth = 5;
                context.strokeStyle = activeColor;
                contextRef.current = context;
            }, []);

            // Update color when state changes
            useEffect(() => {
                if (contextRef.current) {
                    contextRef.current.strokeStyle = activeColor;
                }
            }, [activeColor]);

          const getCoords = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    
    // Check if it's a touch event first
    if (e.touches && e.touches.length > 0) {
        return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
        };
    }
    
    // Fallback to standard mouse event
    return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    };
};
            const start = (e) => {
                const { x, y } = getCoords(e);
                contextRef.current.beginPath();
                contextRef.current.moveTo(x, y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const { x, y } = getCoords(e);
                contextRef.current.lineTo(x, y);
                contextRef.current.stroke();
            };

            const stop = () => {
                if (isDrawing) {
                    contextRef.current.closePath();
                    setIsDrawing(false);
                }
            };

            const handleClear = () => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
            };

const handleSubmit = () => {
    const canvas = canvasRef.current;
    const imageData = canvas.toDataURL('image/png');
    const savedData = localStorage.getItem('sandbox-gallery');
    const existing = savedData ? JSON.parse(savedData) : [];
    
    const newEntry = {
        id: Date.now(),
        image: imageData,
        date: new Date().toLocaleDateString()
    };
    
    localStorage.setItem('sandbox-gallery', JSON.stringify([newEntry, ...existing]));
    window.location.href = 'gallery.html';
};

            return (
                <div className="max-w-3xl mx-auto">
                    <nav className="mb-6">
                        <a href="index.html" className="text-indigo-600 font-bold hover:underline">
                            ← Back to Hub
                        </a>
                    </nav>

                    <header className="mb-8">
                        <h1 className="text-4xl font-black text-slate-900 tracking-tight">Drawback</h1>
                        <p className="text-slate-500 mt-2">A minimalist drawing tool for visual feedback and storytelling.</p>
                    </header>

                    <div className="mb-4 flex space-x-4">
                        {colors.map((color) => (
                            <button 
                                key={color.name}
                                onClick={() => setActiveColor(color.value)}
                                className={`w-8 h-8 rounded-full border-2 ${activeColor === color.value ? 'border-indigo-500' : 'border-slate-300'} focus:outline-none`}
                                style={{ backgroundColor: color.value }}
                            />
                        ))}
                        <button 
                            onClick={handleClear}
                            className="ml-auto px-3 py-1 bg-red-400 text-white rounded hover:bg-red-600 transition-all"
                        >
                            Clear
                        </button>
                    </div>

                    <canvas 
                        ref={canvasRef}
                        onMouseDown={start}
                        onMouseMove={draw}
                        onMouseUp={stop}
                        onMouseLeave={stop}
                        onTouchStart={start}
                        onTouchMove={draw}
                        onTouchEnd={stop}
                        className="w-full h-[400px] bg-white rounded-lg shadow-md border"
                    />

                    <button 
                        onClick={handleSubmit}
                        className="mt-6 px-6 py-3 bg-indigo-600 text-white rounded-full font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all"
                    >
                        Submit to Gallery
                    </button>
                </div>
            );
        };

        ReactDOM.render(<Drawback />, document.getElementById('root'));
