<!DOCTYPE html>
<html>
<head>
<title>Floop! Wireframe Mock-up</title>
<style>
body { font-family: sans-serif; margin: 20px; text-align: center; }
header, nav, section, footer { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
.info-cards { display: flex; gap: 10px; }
.card { flex: 1; border: 1px solid #eee; padding: 10px; }
.form-group { margin-bottom: 10px; text-align: left; }
label { display: block; margin-bottom: 5px; }
input[type="email"], input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ddd; }
#canvas-area { width: 100%; height: 300px; border: 2px solid #555; background-color: #f9f9f9; position: relative; }
#canvas-label { position: absolute; top: 10px; left: 10px; font-weight: bold; }
.actions { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
.clear-btn { background-color: #eee; color: #333; }
.submit-btn { background-color: #27ae60; color: white; font-weight: bold; }
</style>
</head>
<body>

<header>
  <h1>Floop!</h1>
</header>

<nav>
  <button>View Gallery</button>
</nav>

<section class="info-cards">
  <div class="card">
    <h3>What is Floop?</h3>
    <p>...description...</p>
  </div>
  <div class="card">
    <h3>Why use Floop?</h3>
    <p>...description...</p>
  </div>
  <div class="card">
    <h3>Your Privacy</h3>
    <p>...description...</p>
  </div>
</section>

<section>
  <div class="form-group">
    <label for="email">Email Address (Optional)</label>
    <input type="email" id="email" placeholder="email@example.com">
  </div>
  <div class="form-group">
    <label for="postcode">Postcode *</label>
    <input type="text" id="postcode" placeholder="e.g. SW1A 1AA">
  </div>

  <div id="canvas-area">
    <span id="canvas-label">Draw your feedback below *</span>
    </div>

  <div class="actions">
    <button class="clear-btn">Clear</button>
    <button class="submit-btn">Submit Feedback</button>
  </div>
</section>

</body>
</html>
