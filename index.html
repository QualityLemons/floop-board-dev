<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floop! - Creative Feedback</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("xe0f4QZvOX0K3dKIg"); 
        })();
    </script>
    
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f4f7f6;
            --text: #333;
            --card-bg: white;
        }

        body.dark-theme {
            --primary: #ecf0f1;
            --light: #121212;
            --text: #e0e0e0;
            --card-bg: #1e1e1e;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            line-height: 1.6; 
            color: var(--text); 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: var(--light); 
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav { text-align: right; margin-bottom: 10px; }
        .nav-link {
            display: inline-block;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            border: 2px solid var(--secondary);
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        .nav-link:hover { background-color: var(--secondary); color: white; }

        .theme-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            padding: 10px 15px; border-radius: 20px; border: none;
            background: var(--primary); color: var(--light);
            cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { color: var(--primary); font-size: 3.5rem; margin-bottom: 0; }
        h2 { font-weight: 300; color: #7f8c8d; }

        .info-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; margin-bottom: 40px; 
        }

        .card { 
            background: var(--card-bg); padding: 25px; 
            border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }

        .form-container { 
            background: var(--card-bg); padding: 40px; 
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--primary); }
        input[type="email"], input[type="text"] { 
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; background: var(--card-bg); color: var(--text);
            box-sizing: border-box;
        }

        .canvas-area { text-align: center; margin-top: 20px; }
        canvas { 
            border: 2px solid var(--primary); background: #fff; 
            cursor: crosshair; touch-action: none; border-radius: 8px; max-width: 100%;
        }

        .controls { 
            margin-top: 20px; display: flex; gap: 15px; 
            width: 100%; justify-content: center;
        }

        .btn { padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .clear-btn { background: #ecf0f1; color: #2c3e50; }
        .send-btn { background: var(--success); color: white; flex-grow: 1; max-width: 300px; }

        footer {
            text-align: center; margin-top: auto; padding: 40px 20px 20px;
            border-top: 1px solid #ddd; font-size: 0.9rem; color: #7f8c8d;
        }
        footer a { color: var(--secondary); text-decoration: none; font-weight: 600; }
        body.dark-theme footer { border-top-color: #444; }
    </style>
</head>
<body>

    <button id="themeToggle" class="theme-toggle">🌙 Dark Mode</button>

    <nav>
        <a href="gallery.html" class="nav-link">View Gallery →</a>
    </nav>

    <header>
        <h1>Floop!</h1>
        <h2>Welcome to the future of good feedback</h2>
    </header>

    <div class="info-grid">
        <div class="card">
            <h3>What is Floop?</h3>      
            <p>A tool to support children and young people to give feedback at their own pace.</p>
        </div>
        <div class="card">
            <h3>Your Privacy</h3>
            <p>Only your postcode is required to help us understand where feedback comes from.</p>
        </div>
    </div>

    <div class="form-container">
        <div class="input-group">
            <label for="userEmail">Email Address (Optional)</label>
            <input type="email" id="userEmail" placeholder="email@example.com">
        </div>
        <div class="input-group">
            <label for="userPostcode">Postcode *</label>
            <input type="text" id="userPostcode" placeholder="e.g. SW1A 1AA" required>
        </div>

        <div class="canvas-area">
            <label>Draw your feedback below *</label><br>
