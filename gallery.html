<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floop! - Feedback Gallery</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --light: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--light); 
            padding: 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        h1 { text-align: center; color: var(--primary); font-size: 3rem; margin-bottom: 10px; }
        
        /* Live Badge Style */
        .live-status {
            text-align: center;
            font-size: 0.8rem;
            color: #27ae60;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .dot {
            height: 10px;
            width: 10px;
            background-color: #27ae60;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        .feedback-card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.2s;
        }

        .feedback-card img { width: 100%; border-radius: 8px; border: 1px solid #ddd; }
        
        .meta { margin: 10px 0; font-size: 0.85rem; color: #7f8c8d; }

        /* Professional Reaction Chips */
        .reaction-bar {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .reaction-chip {
            border: 1px solid #e0e0e0;
            background: white;
            padding: 5px 8px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .reaction-chip:hover { transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chip-happy:hover { background: #fff9c4; border-color: #fbc02d; }
        .chip-sad:hover { background: #e3f2fd; border-color: #1e88e5; }
        .chip-angry:hover { background: #ffebee; border-color: #e53935; }
        .chip-anxious:hover { background: #f3e5f5; border-color: #8e24aa; }

        .nav-btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--secondary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }

#scrollTopBtn {
    display: none; position: fixed; bottom: 20px; right: 30px;
    background: var(--primary); color: white; border: none;
    padding: 15px; border-radius: 50%; cursor: pointer;
}
    </style>
</head>
<body>

    <a href="index.html" class="nav-btn">← Back to Form</a>
    
    <h1>Floop Gallery</h1>
    <div class="live-status"><span class="dot"></span> LIVE UPDATES ACTIVE</div>

    <div id="gallery" class="gallery-grid">Loading drawings...</div>

    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="scrollTopBtn">↑</button>

    <script>
        // 1. MUST UPDATE THIS URL EVERY TIME YOU DEPLOY A "NEW DEPLOYMENT"
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzAAj22Yw4p5nERryYpOyqb1FougMnIljAaG9AR34lvygLMKZGMI1es6WbX-DP7vm03/exec';

    async function refreshData() {
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();

            const galleryDiv = document.getElementById('gallery');

            // DEBUG: Check if drawings actually exist
            if (!data.drawings || data.drawings.length === 0) {
                galleryDiv.innerHTML = "<p style='grid-column: 1/-1;'>No drawings found. Check your Sheet headers!</p>";
                return;
            }

            // 2. Build gallery if it's the first load
            if (galleryDiv.innerHTML.includes('Loading')) {
                renderGallery(data.drawings);
            }

            // 3. Update Reaction Counts
            Object.keys(data.reactionCounts).forEach(key => {
                const countSpan = document.getElementById(`count-${key}`);
                if (countSpan) {
                    countSpan.innerText = data.reactionCounts[key];
                }
            });
            
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('gallery').innerHTML = "Error connecting to Google Sheets. Check permissions.";
        }
    }

    function renderGallery(drawings) {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';
        
        // We reverse so the newest feedback appears at the top
        drawings.reverse().forEach(drawing => {
            const card = document.createElement('div');
            card.className = 'feedback-card';
            
            // Note: drawing.my_image_data and drawing.user_postcode 
            // MUST match your spreadsheet column headers exactly.
            card.innerHTML = `
                <img src="${drawing.my_image_data}" alt="Feedback Drawing">
                <div class="meta">Postcode: ${drawing.user_postcode || 'N/A'}</div>
                
                <div class="reaction-bar">
                    <button class="reaction-chip chip-happy" onclick="sendReaction('${drawing.rowId}', 'happy')">
                        😊 <span class="reaction-count" id="count-${drawing.rowId}-happy">0</span>
                    </button>
                    <button class="reaction-chip chip-sad" onclick="sendReaction('${drawing.rowId}', 'sad')">
                        😢 <span class="reaction-count" id="count-${drawing.rowId}-sad">0</span>
                    </button>
                    <button class="reaction-chip chip-angry" onclick="sendReaction('${drawing.rowId}', 'angry')">
                        😡 <span class="reaction-count" id="count-${drawing.rowId}-angry">0</span>
                    </button>
                    <button class="reaction-chip chip-anxious" onclick="sendReaction('${drawing.rowId}', 'anxious')">
                        😰 <span class="reaction-count" id="count-${drawing.rowId}-anxious">0</span>
                    </button>
                </div>
            `;
            gallery.appendChild(card);
        });
    }

    async function sendReaction(entryId, emotion) {
        // Optimistic UI update
        const countSpan = document.getElementById(`count-${entryId}-${emotion}`);
        countSpan.innerText = parseInt(countSpan.innerText) + 1;

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                type: 'reaction',
                entryId: entryId,
                emotion: emotion
            })
        });
    }

    // Run on load and every 5 seconds
    refreshData();
    setInterval(refreshData, 5000);

    // Show scroll to top button
    window.addEventListener('scroll', () => {
        document.getElementById('scrollTopBtn').style.display = window.scrollY > 300 ? 'block' : 'none';
    });
</script>
