<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floop! - Feedback Gallery</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f7f6; 
            padding: 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        h1 { text-align: center; color: #2c3e50; font-size: 3rem; }
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
            margin-top: 40px; 
        }
        .feedback-card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center;
        }
        .feedback-card img { 
            width: 100%; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
        }
        .meta { 
            margin-top: 10px; 
            font-size: 0.9rem; 
            color: #7f8c8d; 
        }
        .nav-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="nav-btn">← Back to Feedback Form</a>
    <h1>Floop Gallery</h1>
    <div id="gallery" class="gallery-grid">Loading drawings...</div>

    <script>
        // Your specific Sheet ID
        const SHEET_ID = '1Ma-xNmBDuCCvdP6l_z9w3jn9i_z25JYFtozVTzAiJ_w';
        // This URL fetches the sheet as a CSV (the easiest way to read public data)
        const url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vSuTXZ0e4aC_8P0Z9TngSX_xqf2EF7GGf6AI-cGBlVQ7bVHfrK_17EaHWtUoe_IAYQQZ6UgG9UbwQpu/pubhtml`;

// URL of your deployed Google Apps Script
const scriptURL = 'YOUR_DEPLOYED_WEB_APP_URL';

async function refreshData() {
    try {
        const response = await fetch(scriptURL);
        const data = await response.json();

        // 1. If it's the first load, build the gallery
        if (document.getElementById('gallery').innerHTML.includes('Loading')) {
            renderGallery(data.drawings);
        }

        // 2. Always update the reaction counts
        Object.keys(data.reactionCounts).forEach(key => {
            // key looks like "2-happy"
            const countSpan = document.getElementById(`count-${key}`);
            if (countSpan) {
                countSpan.innerText = data.reactionCounts[key];
            }
        });
        
    } catch (error) {
        console.error("Refresh failed:", error);
    }
}

// Initial load
refreshData();

// Refresh counts every 5 seconds (5000 milliseconds)
setInterval(refreshData, 5000);

function renderGallery(drawings) {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    
    drawings.reverse().forEach(drawing => {
        const card = document.createElement('div');
        card.className = 'feedback-card';
        card.innerHTML = `
            <img src="${drawing.my_image_data}">
            <div class="meta">${drawing.user_postcode}</div>
            <div class="reaction-bar">
                <button class="reaction-chip chip-happy" onclick="sendReaction('${drawing.rowId}', 'happy')">
                    😊 <span class="reaction-count" id="count-${drawing.rowId}-happy">0</span>
                </button>
                <button class="reaction-chip chip-sad" onclick="sendReaction('${drawing.rowId}', 'sad')">
                    😢 <span class="reaction-count" id="count-${drawing.rowId}-sad">0</span>
                </button>
                <button class="reaction-chip chip-angry" onclick="sendReaction('${drawing.rowId}', 'angry')">
                    😡 <span class="reaction-count" id="count-${drawing.rowId}-angry">0</span>
                </button>
                <button class="reaction-chip chip-anxious" onclick="sendReaction('${drawing.rowId}', 'anxious')">
                    😰 <span class="reaction-count" id="count-${drawing.rowId}-anxious">0</span>
                </button>
            </div>
        `;
        gallery.appendChild(card);
    });
}

async function sendReaction(entryId, emotion) {
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxt-K2R8ErsBOJ8TqHKDvbdeI1fN-4Bz_d42xMgHvJBkqao0ET0ZegSiMEma22SneX6/exec';    
    // Update UI immediately (Optimistic UI)
    const countSpan = document.getElementById(`count-${entryId}-${emotion}`);
    countSpan.innerText = parseInt(countSpan.innerText) + 1;

    // Send to Google Sheets
    fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
            type: 'reaction',
            entryId: entryId,
            emotion: emotion
        })
    });
}

        async function fetchGallery() {
            try {
                const response = await fetch(url);
                const data = await response.text();
                
                // Simple CSV parser
                const rows = data.split('\n').slice(1); // Skip header row
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';

                rows.reverse().forEach(row => {
                    // Split row by comma but handle cases where data might contain commas
                    const columns = row.split('","').map(col => col.replace(/"/g, ''));
                    
                    if (columns.length >= 4) {
                        const date = columns[0];
                        const postcode = columns[2];
                        const imageData = columns[3];

                        const card = document.createElement('div');
                        card.className = 'feedback-card';
                        card.innerHTML = `
    <img src="${imageData}" alt="Feedback Drawing">
    <div class="meta">Location: ${postcode} | ${new Date(date).toLocaleDateString()}</div>
    
    <div class="reaction-bar">
        <button onclick="sendReaction('${rowId}', 'happy')">😊 <span id="count-${rowId}-happy">0</span></button>
        <button onclick="sendReaction('${rowId}', 'sad')">😢 <span id="count-${rowId}-sad">0</span></button>
        <button onclick="sendReaction('${rowId}', 'angry')">😡 <span id="count-${rowId}-angry">0</span></button>
        <button onclick="sendReaction('${rowId}', 'anxious')">😰 <span id="count-${rowId}-anxious">0</span></button>
    </div>
`;
                        gallery.appendChild(card);
                    }
                });
            } catch (error) {
                document.getElementById('gallery').innerText = "Failed to load gallery. Make sure there is data in the sheet!";
                console.error(error);
            }
        }

        fetchGallery();
    </script>
    <a href="#" onclick="window.close(); return false;" class="nav-btn">← Close Gallery</a>
    <button onclick="scrollToTop()" id="scrollTopBtn" title="Go to top">↑ Top</button>
</body>
</html>
