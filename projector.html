<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projector</title>
</head>
<body>
  <main class="bg-white rounded-xl shadow-md border border-slate-200 p-8">
    <form id="rtfForm" class="space-y-6">
        <div class="form-group">
            <label class="block text-sm font-bold text-slate-700 mb-2" for="q1">What do you want to accomplish?</label>
            <textarea id="q1" maxlength="210" class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="e.g., Launch a new community garden..."></textarea>
            <div class="text-right text-xs text-slate-400 mt-1"><span class="counter">0</span> / 210</div>
        </div>

        <button type="submit" class="w-full mt-6 px-6 py-3 bg-indigo-600 text-white rounded-full font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">
            Generate & Save Project
        </button>
    </form>
</main>

<script>
document.getElementById('rtfForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // 1. Collect Data
    const formData = {
        date: new Date().toLocaleDateString(),
        q1: document.getElementById('q1').value,
        q2: document.getElementById('q2').value,
        q3: document.getElementById('q3').value,
        q4: document.getElementById('q4').value,
        q5: document.getElementById('q5').value,
        q6: document.getElementById('q6').value
    };

    // 2. Save to LocalStorage for the Gallery
    const history = JSON.parse(localStorage.getItem('projectourist_data') || '[]');
    history.unshift(formData); // Add to start of list
    localStorage.setItem('projectourist_data', JSON.stringify(history));

    // 3. Generate RTF Content
    const rtfHeader = "{\\rtf1\\ansi\\deff0{\\fonttbl{\\f0 Arial;}}\\f0\\fs28 ";
    const rtfBody = `
\\b PROJECT SUMMARY \\b0 \\line
Generated on: ${formData.date} \\line \\line
\\b Goal: \\b0 ${formData.q1} \\line
\\b Difference: \\b0 ${formData.q2} \\line
\\b End State: \\b0 ${formData.q3} \\line
\\b Requirements: \\b0 ${formData.q4} \\line
\\b Best Case: \\b0 ${formData.q5} \\line
\\b Worst Case: \\b0 ${formData.q6}
}`;
    const fullRTF = rtfHeader + rtfBody + "}";

    // 4. Trigger Download
    const blob = new Blob([fullRTF], { type: 'application/rtf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Project-${Date.now()}.rtf`;
    a.click();
    
    alert("Project saved to Projectourist and downloaded!");
});

// Simple Character Counter Logic
document.querySelectorAll('textarea').forEach(area => {
    area.addEventListener('input', function() {
        this.parentElement.querySelector('.counter').innerText = this.value.length;
    });
});
</script>
</body>
</html>
