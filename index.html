<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floop! - Creative Feedback</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("xe0f4QZvOX0K3dKIg"); 
        })();

    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f4f7f6;
            --text: #333;
            --card-bg: white;
        }

        /* Dark Mode variables override */
        body.dark-theme {
            --primary: #ecf0f1;
            --light: #121212;
            --text: #e0e0e0;
            --card-bg: #1e1e1e;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            line-height: 1.6; 
            color: var(--text); 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: var(--light); 
            transition: background-color 0.3s, color 0.3s;
        }

        /* Navigation Links */
        nav { text-align: right; margin-bottom: 10px; }
        .nav-link {
            display: inline-block;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            border: 2px solid var(--secondary);
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        .nav-link:hover { background-color: var(--secondary); color: white; }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: var(--primary);
            color: var(--light);
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { color: var(--primary); font-size: 3.5rem; margin-bottom: 0; }
        h2 { font-weight: 300; color: #7f8c8d; }

        .info-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }

        .form-container { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
            input[type="email"], input[type="text"] { 
                width: 100%; 
                padding: 12px; 
                border: 1px solid #ddd; 
                border-radius: 8px; 
                transition: border-color 0.3s;
            }
        </style>
    </head>

    </footer>

    </script>
</body>
</html>
